{% extends 'base.html' %}

{% block title %}Login - Equipe Quilombo Araucária{% endblock %}

{% block content %}
<section class="page-hero page-hero-sm">
    <div class="page-hero-overlay"></div>
    <div class="page-hero-content">
        <h1><i data-lucide="users" aria-hidden="true"></i> Área da Equipe</h1>
        <p>Acesso exclusivo para membros da equipe</p>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="login-wrapper animate-on-scroll">
            <div class="login-card">
                <h2><i data-lucide="log-in" aria-hidden="true"></i> Entrar</h2>
                <form method="post" action="{% url 'equipe_login' %}" class="contact-form" novalidate>
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="id_username">
                            <i data-lucide="user" aria-hidden="true"></i> Usuário
                        </label>
                        <input type="text" name="username" id="id_username" class="form-input" placeholder="Seu nome de usuário" required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="id_password">
                            <i data-lucide="lock" aria-hidden="true"></i> Senha
                        </label>
                        <input type="password" name="password" id="id_password" class="form-input" placeholder="Sua senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg btn-full">
                        <i data-lucide="log-in" aria-hidden="true"></i> Entrar
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
